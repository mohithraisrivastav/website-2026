<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Mohith Rai Srivastav</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        html { font-size: 125%; }
        body { background-color: #0a0a0a; color: #ffffff; line-height: 1.6; -webkit-font-smoothing: antialiased; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; position: fixed; width: 100%; background: rgba(10, 10, 10, 0.95); z-index: 9999; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { height: 60px; width: auto; mix-blend-mode: screen; opacity: 0.7; transition: 0.5s; cursor: pointer; }
        .logo:hover { opacity: 1; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4)); }
        .nav-brand { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
        .nav-brand .name { display: block; font-size: 0.9rem; font-weight: 900; color: #fff; letter-spacing: 3px; text-transform: uppercase; }
        .nav-back { color: #888; text-decoration: none; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .nav-back:hover { color: #fff; }

        .checkout-wrap { max-width: 1400px; margin: 0 auto; padding: 140px 5vw 100px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 80px; }

        .page-title { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1; margin-bottom: 50px; }

        .form-section { margin-bottom: 50px; }
        .form-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; color: #555; margin-bottom: 25px; display: block; border-bottom: 1px solid #222; padding-bottom: 15px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .form-grid.full { grid-template-columns: 1fr; }
        .form-field { display: flex; flex-direction: column; }
        .form-field label { font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 10px; }
        .form-field label .req { color: #fff; }
        .form-field input, .form-field select, .form-field textarea { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 0.95rem; padding: 12px 0; outline: none; border-radius: 0; font-family: inherit; transition: 0.3s; }
        .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-bottom-color: #fff; }
        .form-field select { cursor: pointer; background: #0a0a0a; }
        .form-field select option { background: #0a0a0a; }
        .form-field textarea { resize: vertical; min-height: 80px; }
        .form-field .hint { font-size: 0.65rem; color: #555; margin-top: 8px; font-weight: 400; }

        .summary-panel { background: #0f0f0f; padding: 40px; position: sticky; top: 120px; height: fit-content; border: 1px solid #1a1a1a; }
        .summary-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #222; }
        .summary-items { max-height: 320px; overflow-y: auto; margin-bottom: 25px; }
        .summary-item { display: grid; grid-template-columns: 60px 1fr auto; gap: 15px; margin-bottom: 20px; align-items: center; }
        .summary-item img { width: 60px; aspect-ratio: 1/1; object-fit: cover; background: #111; }
        .summary-item h4 { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #fff; margin-bottom: 4px; }
        .summary-item .qty { font-size: 0.6rem; color: #666; }
        .summary-item .price { font-size: 0.75rem; color: #fff; font-weight: 600; }
        .summary-empty { padding: 40px 0; text-align: center; color: #555; font-size: 0.8rem; }

        .summary-breakdown { border-top: 1px solid #222; padding-top: 25px; margin-bottom: 25px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 0.8rem; }
        .summary-row .label { color: #888; text-transform: uppercase; letter-spacing: 2px; font-size: 0.65rem; font-weight: 600; }
        .summary-row .value { color: #fff; font-weight: 500; }
        .summary-row.total { font-size: 1.1rem; padding-top: 20px; margin-top: 20px; border-top: 1px solid #222; margin-bottom: 0; }
        .summary-row.total .label { color: #fff; font-size: 0.75rem; font-weight: 700; letter-spacing: 3px; }
        .summary-row.total .value { font-size: 1.3rem; font-weight: 900; }

        .pay-btn { width: 100%; padding: 22px; background: #fff; color: #000; border: none; font-family: inherit; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; cursor: pointer; transition: 0.3s; margin-top: 30px; }
        .pay-btn:hover:not(:disabled) { background: #ccc; letter-spacing: 5px; }
        .pay-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .security-note { margin-top: 20px; text-align: center; font-size: 0.6rem; color: #555; letter-spacing: 2px; text-transform: uppercase; line-height: 1.8; }
        .security-note svg { display: inline-block; vertical-align: middle; width: 12px; height: 12px; margin-right: 6px; fill: #555; }

        .payment-methods { margin-top: 20px; padding: 18px; background: #0a0a0a; border: 1px solid #1a1a1a; text-align: center; }
        .payment-methods .label { font-size: 0.55rem; color: #555; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; margin-bottom: 10px; }
        .payment-methods .methods { font-size: 0.7rem; color: #888; letter-spacing: 1px; }

        .loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 99999; align-items: center; justify-content: center; }
        .loader.active { display: flex; }
        .loader-inner { text-align: center; }
        .loader-spin { width: 40px; height: 40px; border: 2px solid #222; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        .loader-text { font-size: 0.65rem; color: #888; letter-spacing: 4px; text-transform: uppercase; font-weight: 600; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box { background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.3); padding: 18px; margin-bottom: 30px; font-size: 0.75rem; color: #ff8080; display: none; }
        .error-box.active { display: block; }

        @media (max-width: 1000px) {
            .checkout-wrap { grid-template-columns: 1fr; gap: 40px; padding-top: 110px; }
            .summary-panel { position: static; }
            .form-grid { grid-template-columns: 1fr; }
            .nav-brand { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-link"><img src="Mohith LOGO.png" alt="Logo" class="logo"></a>
        <div class="nav-brand"><span class="name">Checkout</span></div>
        <a href="shop.html" class="nav-back">← Back to Shop</a>
    </nav>

    <div class="loader" id="loader">
        <div class="loader-inner">
            <div class="loader-spin"></div>
            <div class="loader-text" id="loaderText">Processing</div>
        </div>
    </div>

    <main class="checkout-wrap">
        <div class="form-side">
            <h1 class="page-title">Complete<br>Order.</h1>

            <div class="error-box" id="errorBox"></div>

            <form id="checkoutForm">
                <div class="form-section">
                    <div class="form-label">01 / Contact</div>
                    <div class="form-grid">
                        <div class="form-field">
                            <label>Full Name <span class="req">*</span></label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-field">
                            <label>Email <span class="req">*</span></label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-field">
                            <label>Phone <span class="req">*</span></label>
                            <input type="tel" name="phone" required placeholder="+91 98765 43210">
                        </div>
                        <div class="form-field">
                            <label>GSTIN (optional)</label>
                            <input type="text" name="gstin" placeholder="For business invoice">
                        </div>
                    </div>
                </div>

                <div class="form-section" id="shippingSection">
                    <div class="form-label">02 / Shipping Address</div>
                    <div class="form-grid">
                        <div class="form-field" style="grid-column: 1 / -1;">
                            <label>Country <span class="req">*</span></label>
                            <select name="country" id="countrySelect" required>
                                <option value="IN" selected>India</option>
                                <option value="US">United States</option>
                                <option value="GB">United Kingdom</option>
                                <option value="AE">United Arab Emirates</option>
                                <option value="SG">Singapore</option>
                                <option value="AU">Australia</option>
                                <option value="CA">Canada</option>
                                <option value="DE">Germany</option>
                                <option value="FR">France</option>
                                <option value="IT">Italy</option>
                                <option value="ES">Spain</option>
                                <option value="NL">Netherlands</option>
                                <option value="JP">Japan</option>
                                <option value="OTHER">Other (International)</option>
                            </select>
                        </div>
                        <div class="form-field" style="grid-column: 1 / -1;">
                            <label>Address Line 1 <span class="req">*</span></label>
                            <input type="text" name="address1" required>
                        </div>
                        <div class="form-field" style="grid-column: 1 / -1;">
                            <label>Address Line 2</label>
                            <input type="text" name="address2">
                        </div>
                        <div class="form-field">
                            <label>City <span class="req">*</span></label>
                            <input type="text" name="city" required>
                        </div>
                        <div class="form-field">
                            <label>State / Province <span class="req">*</span></label>
                            <input type="text" name="state" required>
                        </div>
                        <div class="form-field">
                            <label>Postal Code <span class="req">*</span></label>
                            <input type="text" name="postal" required>
                        </div>
                        <div class="form-field">
                            <label>Delivery Notes</label>
                            <input type="text" name="notes" placeholder="Landmark, gate code, etc.">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-label">03 / Confirmation</div>
                    <div class="form-field">
                        <label style="color: #888; font-size: 0.7rem; text-transform: none; letter-spacing: 0.5px; line-height: 1.8;">
                            By completing this order, you acknowledge that Resurface series prints are large-format archival works, hand-packed and shipped via insured courier. Ship time: 7-10 days (domestic) / 14-21 days (international). You will receive tracking on dispatch.
                        </label>
                    </div>
                </div>
            </form>
        </div>

        <aside class="summary-panel">
            <div class="summary-title">Order Summary</div>
            <div class="summary-items" id="summaryItems"></div>
            <div class="summary-breakdown" id="breakdown">
                <div class="summary-row"><span class="label">Subtotal</span><span class="value" id="subtotalVal">₹0</span></div>
                <div class="summary-row"><span class="label">Shipping</span><span class="value" id="shippingVal">—</span></div>
                <div class="summary-row" id="gstRow"><span class="label">GST (12%)</span><span class="value" id="gstVal">₹0</span></div>
                <div class="summary-row total"><span class="label">Total</span><span class="value" id="totalVal">₹0</span></div>
            </div>

            <button type="button" class="pay-btn" id="payBtn" onclick="initiatePayment()">Pay Securely →</button>

            <div class="payment-methods">
                <div class="label">Accepted Methods</div>
                <div class="methods">UPI · Cards · Netbanking · EMI · Wallets</div>
            </div>

            <div class="security-note">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                256-bit SSL · Razorpay secure checkout
            </div>
        </aside>
    </main>

    <script src="checkout.js"></script>
</body>
</html>
